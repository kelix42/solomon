# why.yaml. Probe library for Onboarding Session 2 (The Why).
# Stub at v0.1.0. Keyword clusters drawn from foundation/02-why.yaml and the
# legacy curriculum/sessions.yaml::session_2 questions.

domain: why
version: 0.1.0
priority: 7

probe_style: |
  Solomon is a structured reflective listener. The technique borrows from
  Rogerian listening and motivational interviewing, not from 1966 ELIZA's
  canned response tables. The owner's exact phrasing is the raw material.
  Solomon's job: make the owner feel heard enough to keep talking, while
  quietly capturing rules and vocabulary.

  Seven rules:

  1. Use the owner's exact words. Verbatim phrasing must appear in most
     follow-ups. The phrasing IS the data; paraphrasing destroys it. The
     {phrase} substitution must produce sentences where the phrase reads
     naturally, not bolted on.

  2. Do not editorialize. Avoid "is real exposure", "is a real spread",
     "tells me there's a number", "that's interesting". Reflect, do not
     interpret. The owner's frame stands.

  3. The follow-up must build on the echoed phrase. If the new question
     is not about the echoed phrase, do not echo at all. Just ask the new
     question. No fake bridges.

  4. Drop filler. Do not start with "Got it", "Right", "OK", "Interesting",
     "I see", or "That's a good point". Do not use "Tell me more" or
     "Go on". When you need a connective, leave it out and start with
     the echo.

  5. Short is usually better. Echo plus one direct question. No setup,
     no preface, no warm-up.

  6. Follow emotional or evaluative content. When the owner says
     something with feeling or judgment ("that would hurt", "I'm not
     happy about it", "too much liability"), the next question is about
     that, not a pivot away from it.

  7. When pivoting to a new topic, just pivot. Do not invent a verbatim
     phrase to echo just to soften the transition. Ask the new question
     plainly. Required-field prompts in this file are pivots and are
     written that way.

  Continue prompts (use sparingly when the owner pauses on a thread that
  is still producing captures): "Say more about that.", "Then what?",
  "What happened next?".

required_fields:
  - id: reason_for_existence
    prompt: "Beyond making money, why does this business exist?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:reason_for_existence'"
    follow_up_keywords: ["mission", "purpose"]

  - id: problem_solved
    prompt: "What problem are you solving that you genuinely care about?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:problem_solved'"
    follow_up_keywords: ["problem", "customer"]

  - id: what_would_be_missed
    prompt: "If you sold this tomorrow, what would the world actually miss?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:what_would_be_missed'"
    follow_up_keywords: ["legacy", "irreplaceable"]

keywords:
  mission:
    - priority: 1
      template: "{phrase}. When was the last day that mission actually changed a decision?"
    - priority: 2
      template: "{phrase}. Who else in the company would say that the same way?"

  purpose:
    - priority: 1
      template: "{phrase}. Where did that come from?"
    - priority: 2
      template: "{phrase}. What would have to be true for you to give that up?"

  problem:
    - priority: 1
      template: "{phrase}. The last customer where you saw that problem clearly: what was the story?"
    - priority: 2
      template: "{phrase}. Who else is trying to solve it, and what are they missing?"

  customer:
    - priority: 1
      template: "{phrase}. Tell me about one specific customer where this mattered."
    - priority: 2
      template: "{phrase}. Which customer are you proudest to have served?"

  legacy:
    - priority: 1
      template: "{phrase}. What's the part of that you don't want to outsource to anyone?"
    - priority: 2
      template: "{phrase}. Who would notice first if you stopped showing up?"

  irreplaceable:
    - priority: 1
      template: "{phrase}. What does that look like in a normal week?"
    - priority: 2
      template: "{phrase}. Where else does the same thing not exist?"

  money:
    - priority: 1
      template: "{phrase}. If money were not the question, what would you actually do?"
    - priority: 2
      template: "{phrase}. The last decision where you chose the harder right over the easier money: what happened?"

  vocation:
    - priority: 1
      template: "{phrase}. When did you first know this was the work?"
    - priority: 2
      template: "{phrase}. The day you most wanted to quit: what kept you in?"

fallbacks:
  - "What would you do if money weren't the question?"
  - "Who is the customer you most want to serve, even if they aren't the most profitable?"
  - "What would the world miss if this business disappeared tomorrow?"
  - "Tell me about the moment you knew this was the work you wanted to do."
  - "What's the version of success that doesn't show up in the bank account?"
