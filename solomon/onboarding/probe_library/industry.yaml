# industry.yaml. Probe library for Onboarding Session 0 (Industry).
# Schema per probe_library/README.md plus two forward-compatible additions
# (probe_style and required_fields) introduced 2026-05-10. Existing readers
# ignore unknown top-level keys, so this remains backward compatible.
#
# Lower priority number wins. Slot {phrase} is replaced verbatim with the
# owner's last phrase. See probe_style below for how follow-ups are written.
#
# Semver bump rules (mirror of README.md):
#   patch (0.1.0 to 0.1.1) for new probe templates under existing keywords.
#   minor (0.1.0 to 0.2.0) for new keywords or new required_fields entries.
#   major (0.1.0 to 1.0.0) for breaking schema changes (field rename, removal).

domain: industry
version: 0.1.0
priority: 9   # 1 to 10. Industry context is the floor every other session
              # builds on, so it ranks high for cloning judgment.

probe_style: |
  Solomon is a structured reflective listener. The technique borrows from
  Rogerian listening and motivational interviewing, not from 1966 ELIZA's
  canned response tables. The owner's exact phrasing is the raw material.
  Solomon's job: make the owner feel heard enough to keep talking, while
  quietly capturing rules and vocabulary.

  Seven rules:

  1. Use the owner's exact words. Verbatim phrasing must appear in most
     follow-ups. The phrasing IS the data; paraphrasing destroys it. The
     {phrase} substitution must produce sentences where the phrase reads
     naturally, not bolted on.

  2. Do not editorialize. Avoid "is real exposure", "is a real spread",
     "tells me there's a number", "that's interesting". Reflect, do not
     interpret. The owner's frame stands.

  3. The follow-up must build on the echoed phrase. If the new question
     is not about the echoed phrase, do not echo at all. Just ask the new
     question. No fake bridges.

  4. Drop filler. Do not start with "Got it", "Right", "OK", "Interesting",
     "I see", or "That's a good point". Do not use "Tell me more" or
     "Go on". When you need a connective, leave it out and start with
     the echo.

  5. Short is usually better. Echo plus one direct question. No setup,
     no preface, no warm-up.

  6. Follow emotional or evaluative content. When the owner says
     something with feeling or judgment ("that would hurt", "I'm not
     happy about it", "too much liability"), the next question is about
     that, not a pivot away from it.

  7. When pivoting to a new topic, just pivot. Do not invent a verbatim
     phrase to echo just to soften the transition. Ask the new question
     plainly. Required-field prompts in this file are pivots and are
     written that way.

  Continue prompts (use sparingly when the owner pauses on a thread that
  is still producing captures): "Say more about that.", "Then what?",
  "What happened next?".

# required_fields. Seven items the session cannot complete without. Each
# may be filled naturally during discovery (Stage B); whatever remains
# unfilled is asked directly during the required-fields pass (Stage C),
# which enforces a hard 2-turn cap per field. "I don't know", "not
# applicable", and "decline to answer" each count as filled and create a
# captured_items row of type=preference tagged with field:<id>.
required_fields:
  - id: industry_label
    prompt: "What industry are you in?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:industry_label'"
    follow_up_keywords: []

  - id: business_category
    prompt: "At the top level, what category does the business fall under?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:business_category'"
    follow_up_keywords: ["product", "service"]

  - id: primary_product_or_service
    prompt: "What is the main thing customers actually pay you for?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:primary_product_or_service'"
    follow_up_keywords: ["product", "service"]

  - id: customer_orientation
    prompt: "Are your customers mostly other businesses, mostly individuals, or a mix?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:customer_orientation'"
    follow_up_keywords: ["customer-mix"]

  - id: geographic_scope
    prompt: "Where do you operate: local, regional, national, or wider?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:geographic_scope'"
    follow_up_keywords: ["channel"]

  - id: revenue_model
    prompt: "How does revenue come in: project by project, recurring, retail, wholesale, or a mix?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:revenue_model'"
    follow_up_keywords: ["price-point", "channel"]

  - id: growth_stage
    prompt: "Where is the business right now: startup, early, established, scaling, or mature?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:growth_stage'"
    follow_up_keywords: ["growth"]

  - id: concentration_risk
    prompt: "Is more than about 40 percent of your revenue from a single customer or a single segment?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:concentration_risk'"
    follow_up_keywords: ["concentration", "exposure"]

# keywords. 12 clusters covering: what they sell, who they sell to, market
# position, competitors, pricing norms, distribution channels, regulatory
# environment, seasonal patterns, customer-acquisition channels, growth
# stage, concentration. Each template uses {phrase} and follows the seven
# rules in probe_style.
keywords:
  product:
    - priority: 1
      template: "{phrase}. What does the typical job look like start to finish?"
    - priority: 2
      template: "{phrase}. Walk me through the most recent one."
    - priority: 3
      template: "{phrase}. What's the version of that you would never sell?"

  service:
    - priority: 1
      template: "{phrase}. What does a typical engagement look like beginning to end?"
    - priority: 2
      template: "{phrase}. The last one you delivered: how did it land?"

  customer-mix:
    - priority: 1
      template: "{phrase}. Has that always been the split, or did it shift?"
    - priority: 2
      template: "{phrase}. Which slice are you trying to grow, and which to shrink?"
    - priority: 3
      template: "{phrase}. What happens to the year if the biggest one slows down?"

  competitor:
    - priority: 1
      template: "{phrase}. Who do you actually lose deals to, by name or by type?"
    - priority: 2
      template: "{phrase}. What do they do that you would never copy?"

  price-point:
    - priority: 1
      template: "{phrase}. Where does the market expect you to price, and where do you actually sit?"
    - priority: 2
      template: "{phrase}. The last time a customer pushed back on price: what did you do?"

  channel:
    - priority: 1
      template: "{phrase}. Which channel is bringing in the bigger jobs lately?"
    - priority: 2
      template: "{phrase}. The last channel you tried and dropped: what killed it?"

  regulation:
    - priority: 1
      template: "{phrase}. When was the last time it actually changed how you work?"
    - priority: 2
      template: "{phrase}. Where would a tighter rule hurt you the most?"

  season:
    - priority: 1
      template: "{phrase}. Walk me through the slowest stretch last year."
    - priority: 2
      template: "{phrase}. What does the busy stretch do to staffing?"

  referral:
    - priority: 1
      template: "{phrase}. The last big job: how did the customer find you?"
    - priority: 2
      template: "{phrase}. Which source has dried up that used to work?"

  growth:
    - priority: 1
      template: "{phrase}. What's the constraint right now: money, people, or demand?"
    - priority: 2
      template: "{phrase}. Where do you see the next 12 months landing?"

  concentration:
    - priority: 1
      template: "{phrase}. What happens to the year if they slow down?"
    - priority: 2
      template: "{phrase}. How long would it take to replace that revenue?"

  exposure:
    - priority: 1
      template: "{phrase}. Have you been there before? What got you out?"
    - priority: 2
      template: "{phrase}. What's the line where you would actively diversify?"

# fallbacks. Cross-keyword forward prompts when nothing in the owner's
# answer triggers a keyword. Plain pivots, no forced echo.
fallbacks:
  - "Tell me about the last quarter that felt different from the one before."
  - "What's a rule about your sector you would give a new owner on day one?"
  - "What's changing in your industry that you're paying attention to?"
  - "Walk me through the typical week: what gets repeated and what doesn't."
  - "What's the part of the business outsiders usually misunderstand?"
