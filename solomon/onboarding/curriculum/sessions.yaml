# Solomon Onboarding Curriculum (Part 25 of the design doc)
#
# 6 fixed sessions, each ~60-90 minutes. Owner answers in voice or text;
# Whisper transcribes voice. After each session, Claude commits the
# relevant YAML files to the tenant's GitHub repo. Owner sees diffs.
#
# Why fixed (not adaptive): every tenant gets the same depth of foundation,
# the owner can prepare, and we can improve the curriculum based on which
# sessions produce the best long-term outcomes.

session_1:
  name: "Belief and worldview"
  duration_min: 90
  output_file: "foundation/belief_system.yaml"
  questions:
    - "How do you see the world? Are people fundamentally trustworthy, neutral, or do you assume bad faith until proven otherwise?"
    - "Do you have a faith or philosophical framework that guides your decisions? If so, briefly describe how it shows up at work."
    - "How do you think about right and wrong? Is it absolute, situational, or somewhere in between?"
    - "How do you think about risk? When do you take a calculated risk versus play it safe?"
    - "When something goes wrong, where does your mind go first: blame, learning, or fixing?"
    - "If money were not a constraint, would your business operate the same way? Where would it differ?"

session_2:
  name: "The why"
  duration_min: 60
  output_file: "foundation/why.yaml"
  questions:
    - "Why does this business exist? Beyond making money."
    - "What problem are you solving that you genuinely care about?"
    - "If you sold this tomorrow, what would the world miss?"
    - "What would you do if money weren't the question?"
    - "Who is the customer you most want to serve, even if they aren't the most profitable?"

session_3:
  name: "Principles"
  duration_min: 90
  output_file: "foundation/principles.yaml"
  questions:
    - "List the rules you live by. Not specific to business — the underlying values that shape decisions."
    - "How do you handle a situation where being honest hurts the business?"
    - "How do you handle a situation where being fair to one person is unfair to another?"
    - "How do you handle loyalty when someone you've supported underperforms?"
    - "What does stewardship mean to you in this business?"
    - "Are you direct or diplomatic by default? Give a recent example."
  followups: "For each principle, ask the owner for a recent concrete example of how it showed up in practice."

session_4:
  name: "Ideal outcomes"
  duration_min: 60
  output_file: "foundation/ideal_outcomes.yaml"
  questions:
    - "Describe what winning looks like in 5 years, across multiple dimensions: money, customer trust, employee retention, reputation, environmental footprint, personal time, family."
    - "Rank those dimensions from most important to least."
    - "Which of those dimensions are you currently sacrificing? Which are you currently overinvesting in?"
    - "What does winning NOT look like? Describe outcomes you'd refuse even if they were profitable."

session_5:
  name: "Non-negotiables"
  duration_min: 90
  output_file: "foundation/non_negotiables.yaml"
  questions:
    - "What will you never do, no matter what?"
    - "For each non-negotiable, when does it apply? Always, or only in specific scopes (pricing, hiring, etc.)?"
    - "Why is each one non-negotiable for you? What's the deeper reason?"
    - "How would you know if Solomon was about to violate one? What's the pattern or keyword that signals it?"
  format_note: "Each non-negotiable becomes a structured YAML entry with: name, description, scope, reasoning, check_type (keyword|regex|llm), check_pattern."

session_6:
  name: "Domain map"
  duration_min: 90
  output_files:
    - "taxonomy/scopes.yaml"
    - "taxonomy/domains.yaml"
    - "taxonomy/decision_types.yaml"
  questions:
    - "Walk me through a typical week. What kinds of decisions do you actually make?"
    - "Group those decisions into 5-10 scopes (pricing, hiring, scheduling, vendor, complaints, etc.)."
    - "For each scope, what are the most common domains or sub-types?"
    - "What's typical volume in each scope? Daily, weekly, monthly?"
    - "What integrations do we need to connect? (Gmail, CRM, accounting, calendar, phone, etc.)"
    - "Which scopes do you most want me to learn first? Which do you want me to stay out of?"

# After Session 6, before the brain goes live:
# 1. Claude does a pass on all 6 session transcripts and proposes initial
#    heuristics ("In session 3 you said X. Should I save this as a
#    heuristic in scope Y?").
# 2. Owner approves each.
# 3. Industry-specific module questions are appended.
# 4. Brain enters observe-only mode for 30 days.
